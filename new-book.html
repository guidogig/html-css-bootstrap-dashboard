<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Book</title>
    <!-- Bootstrap 5.3.8-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <!-- Bootrsap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"><img src="./img/duck.png" alt="Duck logo" height="40" /></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Anagrafica Utenti</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Storico Prestiti</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Help</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2 bg-light text-dark" type="search" placeholder="Cerca..." aria-label="Search" />
            <button class="btn btn-outline-success text-bg-dark" type="submit">Cerca</button>
          </form>
        </div>
      </div>
    </nav>

    <!-- contenitore principale -->
    <div class="container p-4 p-md-2 p-lg-3 mb-5">
      <div class="row">
        <div class="row gx-5">
          <div class="col-12 col-lg-9 mx-auto">
            <!-- Nuovo libro h2 -->
            <div class="row align-items-center">
              <div class="col ps-0 mb-4">
                <h2 class="display-6 fw-semibold">Nuovo Libro</h2>
              </div>
            </div>

            <form>
              <div class="row">
                <div class="col-6 mb-3">
                  <label for="nomeAutore" class="form-label">Nome Autore</label>
                  <input type="text" class="form-control" id="nomeAutore" placeholder="Inserisci il nome dell'autore" />
                </div>
                <div class="col-6 mb-3">
                  <label for="cognomeAutore" class="form-label">Cognome Autore</label>
                  <input type="text" class="form-control" id="cognomeAutore" placeholder="Inserisci il cognome dell'autore" />
                </div>
              </div>
              <div class="row">
                <div class="col-12 mb-3">
                  <label for="titoloLibro" class="form-label">Titolo</label>
                  <input type="text" class="form-control" id="titoloLibro" aria-describedby="titoloDescr" placeholder="Inserisci il titolo del libro" />
                  <div id="titoloDescr" class="form-text">Titolo versione italiana</div>
                </div>
              </div>
              <div class="row">
                <div class="col-12 col-lg-4 mb-3">
                  <label for="genere" class="form-label">Genere</label>
                  <select class="form-select" id="genere" aria-label="genere">
                    <option selected>Scegli il genere...</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="scifi">Sci-fi</option>
                    <option value="giallo">Giallo</option>
                  </select>
                </div>
                <div class="col-12 col-lg-4 mb-3">
                  <label for="annoPubbl" class="form-label">Anno di pubblicazione</label>
                  <input type="number" class="form-control" id="annoPubbl" placeholder="Inserisci l'anno" />
                </div>
                <div class="col-12 col-lg-4 mb-3">
                  <label for="isbn" class="form-label">ISBN#</label>
                  <input type="text" class="form-control" id="isbn" placeholder="Inserisci il codice ISBN#" />
                </div>
              </div>
              <hr class="hr" />
              <div class="mb-3">
                <label for="note" class="form-label">Note</label>
                <textarea class="form-control" id="note" rows="3" placeholder="Inserisci eventuali note sul libro"></textarea>
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="ancheDigitale" />
                <label class="form-check-label" for="ancheDigitale">Disponibile anche in digitale</label>
              </div>
              <button type="submit" class="btn btn-primary">Aggiungi Libro</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
